server:
  port: 9090
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB   # 批量上传10个文件 × 50MB 的上限冗余
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mochu_oa?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mochu@2026}

  #sql:
  #  init:
  #    mode: always
  #    schema-locations: classpath:schema.sql
  #    data-locations: classpath:data.sql
  #    encoding: UTF-8

  flyway:
    enabled: true
    baseline-on-migrate: true      # 已有数据库时自动基线
    baseline-version: 3.1.0        # 基线版本（当前已发布版本）
    locations: classpath:db/migration
    table: flyway_schema_history
    validate-on-migrate: true
    out-of-order: false

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:mochu@2026}
      database: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:noreply@mochu-oa.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail.smtp.ssl.enable: true
      mail.smtp.auth: true

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: ${JWT_SECRET:MochuOA_V3_2_SecretKey_2026_AtLeast32Bytes!}

# MinIO
minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:mochu_admin}
  secret-key: ${MINIO_SECRET_KEY:mochu@2026}
  bucket: mochu-oa

# XXL-JOB
xxl:
  job:
    enabled: false
    admin:
      addresses: http://localhost:8090/xxl-job-admin
    executor:
      appname: mochu-oa-executor
      port: 9999
      logpath: /tmp/xxl-job/logs

# 数据加密配置
encryption:
  aes-key: ${ENCRYPTION_AES_KEY:MochuOA_AES256_Key_32Bytes_2026!}  # 生产环境必须通过环境变量注入

# 接口签名配置
security:
  signature-key: ${SIGNATURE_KEY:MochuOA_Signature_Key_2026}
  signature-enabled: false  # 开启后，SIGNED_PATHS 中的 POST/PUT/PATCH 请求必须携带 X-Sign 签名头
  cors-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:80,http://43.153.149.71}

# Knife4j
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    com.mochu: debug
    org.springframework.security: info

# Flowable
flowable:
  database-schema-update: true   # 自动创建/更新 ACT_* 表
  async-executor-activate: false # 异步执行器（生产环境开启）
  history-level: audit           # 审计级别历史记录

# 消息集成配置
message:
  sms:
    provider: mock    # mock / aliyun / tencent
  email:
    provider: mock    # mock / spring-mail
  # message.email.provider: mock (default) or spring-mail
  wechat:
    enabled: false    # true时启用真实企业微信SDK
